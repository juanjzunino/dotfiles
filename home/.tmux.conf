# -------------------------------- Default -----------------------------------
# Set default shell
set-option -g default-command $SHELL

# Improve colors (Ghostty compatible)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*256col*:Tc"

# Remap prefix from 'C-b' to 'C-a'
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind-key C-a send-prefix

# Vim mode
setw -g mode-keys vi

# Focus events (nvim recommendation)
set-option -g focus-events on

# Copy to clipboard
bind -T copy-mode-vi "v" send -X begin-selection
bind -T copy-mode-vi "V" send -X rectangle-toggle
bind -T copy-mode-vi "y" send -X copy-selection-and-cancel

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Move between panes with vi keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# Enable mouse control (clickable windows, panes, resizable panes)
set-option -g mouse on

# Avoid ESC delay
set -s escape-time 1

# Reload config file
bind r source-file ~/.tmux.conf

# -------------------------------- Status Bar ---------------------------------
# Position
set -g status-position bottom
set -g status-justify left

# Status bar style
set -g status-style "fg=#928374,bg=#1d2021"
set -g status-left "#[fg=#1d2021,bg=#83a598] #{=/10/...:session_name} #[fg=#83a598,bg=#1d2021] "
set -g status-left-length 20
set -g status-right "#[fg=#7c6f64]%H:%M "
set -g status-right-length 20

# Window status (pills)
set -g window-status-format "#[fg=#504945,bg=#1d2021]#[fg=#a89984,bg=#504945] #I:#W #[fg=#504945,bg=#1d2021]"
set -g window-status-current-format "#[fg=#3c3836,bg=#1d2021]#[fg=#ebdbb2,bg=#3c3836] #I:#W #[fg=#3c3836,bg=#1d2021]"
set -g window-status-separator " "

# Pane borders
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#504945"
set -g pane-border-lines single

# Messages
set -g message-style "fg=#ebdbb2,bg=default"
set -g message-command-style "fg=#ebdbb2,bg=default"

# Mode (copy mode, etc)
set -g mode-style "fg=#1d2021,bg=#fabd2f"

# Clock
set -g clock-mode-colour "#928374"

# Bell
set -g window-status-bell-style "fg=#fb4934,bg=default"

# Display panes
set -g display-panes-active-colour "#fabd2f"
set -g display-panes-colour "#665c54"

# -------------------------------- Plugins -----------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.tmux/plugins/tpm/tpm'
